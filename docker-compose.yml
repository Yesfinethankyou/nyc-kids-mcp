# Single-host deployment: NYC events MCP server + Watchtower auto-updater.
#
# Bind to 127.0.0.1 so the port is not exposed to the LAN. Public reach is
# via Tailscale Funnel on the host, which proxies to localhost:8765.
#
# Data lives in ./data on the host (events.db + oauth.db). Wipe events.db
# without touching oauth.db and your claude.ai connector keeps working.

services:
  nyc-events:
    image: ghcr.io/yesfinethankyou/nyc-kids-mcp:latest
    container_name: nyc-events
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Inside the container, the canonical paths are under /data. Override
      # whatever was in .env so a host-style path can't leak in.
      DB_PATH: /data/events.db
      OAUTH_DB_PATH: /data/oauth.db
      PORT: "8765"
      # Requests arrive from the Docker bridge gateway, not 127.0.0.1, so
      # the loopback-only default would make uvicorn ignore X-Forwarded-Proto
      # and advertise http://… in OAuth metadata. claude.ai then POSTs http,
      # Funnel 302s to https, httpx follows and downgrades POST→GET, losing
      # the body — and the /token exchange dies silently.
      #
      # Do NOT set this to "*" (issue #33): Funnel forwards the client's own
      # X-Forwarded-For through, and with every source trusted uvicorn takes
      # the LEFTMOST XFF entry as the client IP — so an attacker mints a
      # fresh rate-limiter bucket per request and the /authorize//token//
      # register limits stop bounding online guessing. Trust exactly the
      # bridge gateway (pinned below): uvicorn then walks XFF right-to-left
      # past the trusted hop and lands on the Funnel-appended real client
      # address, which the attacker can't forge.
      FORWARDED_ALLOW_IPS: "172.28.0.1"
    volumes:
      - ./data:/data
    ports:
      - "127.0.0.1:8765:8765"
    labels:
      # Watchtower will only consider containers with this label set to true.
      com.centurylinklabs.watchtower.enable: "true"
    healthcheck:
      # Defined in the Dockerfile; restating the policy here so compose can
      # surface the result via `docker compose ps`.
      test: ["CMD", "python", "-c", "import socket,sys; s=socket.socket(); s.settimeout(3); sys.exit(0) if s.connect_ex(('127.0.0.1',8765))==0 else sys.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Read-only tailnet dashboard (DASHBOARD-PLAN.md). Same image, second
  # process: a dashboard crash can't take the connector down and the
  # single-worker MCP/OAuth process stays byte-identical. Deliberately NO
  # env_file — this process must never see MCP_AUTH_TOKEN. The ./data mount
  # stays rw (SQLite WAL readers need write access to the -shm sidecar);
  # read-only-ness is enforced at the connection (mode=ro URI) and at the
  # HTTP layer (GET-only routes).
  #
  # Expose via `tailscale serve --bg --https=8766 http://127.0.0.1:8766`
  # (tailnet members only) — NEVER `tailscale funnel`; that's the entire
  # security model. See README "Tailnet dashboard".
  nyc-events-dashboard:
    image: ghcr.io/yesfinethankyou/nyc-kids-mcp:latest
    container_name: nyc-events-dashboard
    command: ["python", "-m", "nyc_events.dashboard"]
    restart: unless-stopped
    environment:
      DB_PATH: /data/events.db
      DASHBOARD_PORT: "8766"
    volumes:
      - ./data:/data
    ports:
      # Bound to all interfaces so the dashboard is reachable on the LAN
      # (http://<nas-lan-ip>:8766) in addition to `tailscale serve`, which
      # keeps working because 0.0.0.0 includes loopback. DELIBERATE relaxation
      # of DASHBOARD-PLAN.md's tailnet-only stance: the dashboard is read-only,
      # never opens oauth.db, and carries no secrets, so LAN exposure leaks only
      # public event data + scraper health — and it has NO login, so only do
      # this on a trusted LAN. Revert to "127.0.0.1:8766:8766" for tailnet-only.
      # The MCP server (8765) is the auth surface and must stay loopback-bound.
      - "8766:8766"
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket,sys; s=socket.socket(); s.settimeout(3); sys.exit(0) if s.connect_ex(('127.0.0.1',8766))==0 else sys.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  watchtower:
    # Version-pinned (issue #36): Watchtower holds the Docker socket
    # (root-equivalent on the host), so it must not itself float on :latest.
    # Bump deliberately after reading its release notes.
    image: containrrr/watchtower:1.7.1
    container_name: nyc-events-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Only update containers with the enable label; do NOT scan the whole
      # host (this matters on a NAS shared with other services).
      WATCHTOWER_LABEL_ENABLE: "true"
      # Poll every 5 minutes. Image updates are user-triggered (tag push on
      # GitHub), so a tight poll window is fine.
      WATCHTOWER_POLL_INTERVAL: "300"
      # Clean up old image versions after a successful update.
      WATCHTOWER_CLEANUP: "true"
      # Public image, no registry auth needed. If we ever flip the GHCR
      # package to private, mount a docker config with a PAT.
      WATCHTOWER_INCLUDE_RESTARTING: "true"

# Pin the bridge subnet so the gateway IP is deterministic and
# FORWARDED_ALLOW_IPS above can name it exactly instead of wildcarding.
# If 172.28.0.0/24 collides with an existing network on your host, change
# both the subnet here and the FORWARDED_ALLOW_IPS value together.
networks:
  default:
    ipam:
      config:
        - subnet: 172.28.0.0/24
          gateway: 172.28.0.1
