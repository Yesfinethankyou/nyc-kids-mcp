# Pinned runtime dependency set (issue #36). Regenerate with:
#
#   python3 -m venv /tmp/lockenv \
#     && /tmp/lockenv/bin/pip install . \
#     && /tmp/lockenv/bin/pip freeze | grep -vi '^nyc[-_]events' > requirements.lock
#     (then re-add this header)
#
# The Dockerfile installs this file first, then the project with --no-deps,
# so image builds no longer float on whatever is newest on PyPI. Hashes are
# deliberately omitted: the image is built multi-arch (amd64 + arm64) and a
# --require-hashes file would need every platform's wheel digests.
# pyproject.toml keeps the loose >= floors for dev installs; this file is the
# reviewed resolution. Bump deliberately, then run the test suite.
